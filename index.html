<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia Pro 2026</title>
    <style>
        :root {
            --bg: linear-gradient(135deg, #ffe4e1 0%, #ffb6c1 100%); --card: #fce4ec; --accent: #e91e63;
            --win: #4caf50; --loss: #f44336; --text: #212121;
        }
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        #app { width: 100%; max-width: 450px; padding: 20px; display: flex; flex-direction: column; }
        
        /* UX Components */
        .progress-container { width: 100%; height: 6px; background: #334155; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent); transition: 0.3s; }
        
        .stat-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .wallet { font-size: 1.5rem; font-weight: 800; color: var(--win); }
        .difficulty { font-size: 0.8rem; background: #334155; padding: 4px 10px; border-radius: 20px; }

        .card { background: var(--card); border-radius: 20px; padding: 25px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        .q-text { font-size: 1.25rem; font-weight: 600; line-height: 1.4; margin-bottom: 25px; }
        
        img { max-width: 100%; height: auto; border-radius: 10px; margin: 10px 0; }
        
        .options { display: grid; gap: 12px; }
        button { 
            background: #334155; color: white; border: none; padding: 16px; 
            border-radius: 12px; font-size: 1rem; text-align: left; cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }
        button:active { transform: scale(0.98); background: #475569; }
        
        /* Feedback Overlay */
        #feedback { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 30px; border-radius: 20px; text-align: center; font-weight: bold;
            font-size: 2rem; z-index: 10; display: none; width: 80%;
        }
        .correct { background: var(--win); color: white; }
        .wrong { background: var(--loss); color: white; }

        .hidden { display: none; }
        .insight-box { background: #0c4a6e; border-left: 4px solid var(--accent); padding: 15px; margin-top: 20px; font-size: 0.9rem; border-radius: 8px; }
        .primary-btn { background: var(--accent); color: #0f172a; font-weight: bold; width: 100%; margin-top: 20px; text-align: center; }
        h1 { color: var(--accent); font-size: 2rem; margin-bottom: 30px; }
        #no-btn { position: relative; width: auto; display: inline-block; margin: 20px 10px; }
    </style>
    <style>
        @media (max-width: 600px) {
            #app { padding: 10px; }
            .card { padding: 20px; }
            h1 { font-size: 1.5rem; }
            .q-text { font-size: 1.1rem; }
            button { padding: 14px; font-size: 0.9rem; }
        }
    </style>
    </style>
</head>
<body>

<div id="app">
    <div id="quiz-screen">
        <div class="stat-bar">
            <div class="difficulty" id="cat-label">Category</div>
            <div class="wallet" id="wallet-display">$0</div>
        </div>
        <div class="progress-container"><div id="progress-bar"></div></div>
        
        <div class="card">
            <div id="val-label" style="color: var(--accent); font-weight: bold; margin-bottom: 5px;">$1 Question</div>
            <div class="q-text" id="q-text">Loading...</div>
            <div id="question-image"></div>
            <div class="options" id="opt-container"></div>
        </div>
    </div>

    <div id="feedback"></div>

    <div id="result-screen" class="hidden">
        <div class="card" style="text-align: center;">
            <h2 id="res-title">Category Complete!</h2>
            <p>Your current bankroll:</p>
            <div class="wallet" id="final-wallet" style="font-size: 3rem;">$0</div>
            <p id="accuracy">Accuracy: 0%</p>
            <button class="primary-btn" onclick="nextCategory()">Next Category</button>
        </div>
    </div>
    <div id="landing-screen">
        <div class="card" style="display: flex; flex-direction: column; align-items: center; text-align: center;">
            <h1>Hi Jadie, this is your secret admirer, you want to be my sweetie?...</h1>
            <button class="primary-btn" onclick="showSecondLanding()" style="width: auto; display: inline-block; margin: 10px;">Yes</button>
            <button id="no-btn" class="primary-btn" style="width: auto; display: inline-block; margin: 10px;">No</button>
        </div>
    </div>

    <div id="second-landing" class="hidden">
        <div class="card" style="display: flex; flex-direction: column; align-items: center; text-align: center;">
            <h1>Great, I knew it! Let's play a game...</h1>
            <button class="primary-btn" onclick="startGame()" style="width: auto; display: inline-block; margin: 10px;">Click to Continue</button>
        </div>
    </div>
</div>

let catIdx = 0, qIdx = 0, wallet = 0, catCorrect = 0, totalCorrect = 0;

function loadQuestion() {
    const q = trivia[catIdx].questions[qIdx];
    document.getElementById('cat-label').innerText = trivia[catIdx].cat;
    const catLabel = document.getElementById('cat-label');
    if (catIdx === 0) {
        catLabel.style.background = 'linear-gradient(to right, #0066cc, #ff0000)';
        catLabel.style.color = 'white';
    } else if (catIdx === 1) {
        catLabel.style.background = '#ff69b4';
        catLabel.style.color = 'white';
    } else if (catIdx === 2) {
        catLabel.style.background = 'linear-gradient(to right, #ff0000, #ffffff)';
        catLabel.style.color = 'black';
    }
    document.getElementById('wallet-display').innerText = `$${wallet}`;
    document.getElementById('val-label').innerText = `$${q.v} Question`;
    document.getElementById('q-text').innerText = q.q;
    document.getElementById('progress-bar').style.width = `${(qIdx / 10) * 100}%`;
    
    const imgDiv = document.getElementById('question-image');
    imgDiv.innerHTML = q.img ? `<img src="${q.img}" alt="Question graphic">` : '';
    
    const container = document.getElementById('opt-container');
    container.innerHTML = '';
    q.a.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(i);
        container.appendChild(btn);
    });
}

function checkAnswer(idx) {
    const q = trivia[catIdx].questions[qIdx];
    const fb = document.getElementById('feedback');
    fb.style.display = 'block';
    
    if (idx === q.c) {
        wallet += q.v;
        catCorrect++;
        totalCorrect++;
        fb.innerText = `CORRECT! +$${q.v}`;
        fb.className = 'correct';
    } else {
        wallet -= q.v;
        fb.innerText = `WRONG! -$${q.v}`;
        fb.className = 'wrong';
    }

    setTimeout(() => {
        fb.style.display = 'none';
        qIdx++;
        if (qIdx < 10) loadQuestion(); else showResults();
    }, 1200);
}

function showResults() {
    document.getElementById('quiz-screen').classList.add('hidden');
    document.getElementById('result-screen').classList.remove('hidden');
    document.getElementById('final-wallet').innerText = `$${wallet}`;
    document.getElementById('accuracy').innerText = `Category Accuracy: ${(catCorrect/10)*100}%`;
}

function nextCategory() {
    catIdx++;
    if (catIdx < trivia.length) {
        qIdx = 0; catCorrect = 0;
        document.getElementById('quiz-screen').classList.remove('hidden');
        document.getElementById('result-screen').classList.add('hidden');
        loadQuestion();
    } else {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('res-title').innerText = "Congratulations!";
        document.querySelector('#result-screen p').innerText = "Total Amount Won:";
        document.getElementById('final-wallet').innerText = `$${wallet}`;
        document.getElementById('accuracy').innerText = `Overall Accuracy: ${(totalCorrect/30)*100}%`;
        const resultScreen = document.getElementById('result-screen');
        const newP = document.createElement('p');
        newP.innerText = "You get to spend with me and dada! Or owe him money... Either way, it's a win!";
        resultScreen.appendChild(newP);
        const img = document.createElement('img');
        img.src = "baby.png";
        img.alt = "Celebration graphic";
        img.style.maxWidth = "100%";
        img.style.height = "auto";
        resultScreen.appendChild(img);
        document.querySelector('.primary-btn').classList.add('hidden');
    }
}

document.getElementById('no-btn').addEventListener('mouseover', () => {
    const btn = document.getElementById('no-btn');
    const x = Math.random() * 200 - 100;
    const y = Math.random() * 200 - 100;
    btn.style.transform = `translate(${x}px, ${y}px)`;
});

function showSecondLanding() {
    document.getElementById('landing-screen').classList.add('hidden');
    document.getElementById('second-landing').classList.remove('hidden');
}

function startGame() {
    document.getElementById('second-landing').classList.add('hidden');
    document.getElementById('quiz-screen').classList.remove('hidden');
    loadQuestion();
}

document.getElementById('quiz-screen').classList.add('hidden');
document.getElementById('result-screen').classList.add('hidden');
document.getElementById('second-landing').classList.add('hidden');
// landing is visible
</script>
</body>
</html>
